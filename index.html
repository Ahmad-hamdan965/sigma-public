<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIGMA XPRESS — Staff Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#DC2430; --red-dark:#A81B24; --red-tint:#FDEBEC;
    --navy:#0F2A4D; --navy2:#173C6B; --navy-tint:#EAF0F7;
    --bg:#F5F6F8; --card:#FFFFFF; --line:#E6E8EC;
    --text:#16202E; --text-mut:#6B7686;
    --success:#1E9E5A; --success-tint:#E7F7EE;
    --amber:#E5900A; --amber-tint:#FCF1DE;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Inter',sans-serif; background:var(--bg); color:var(--text);}
  h1,h2,h3,.brand,button,.navitem{font-family:'Poppins',sans-serif;}

  #setupScreen, #loginScreen{min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;}
  .authCard{background:var(--card); border:1px solid var(--line); border-radius:18px; padding:36px; width:100%; max-width:380px; box-shadow:0 20px 50px rgba(15,42,77,.12);}
  .brandRow{display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:6px;}
  .mark{width:34px; height:22px; position:relative;}
  .mark span{position:absolute; left:0; background:var(--red); border-radius:2px;}
  .brandLogoImg{height:32px; width:auto; display:block;}

  .brand{font-weight:800; font-size:19px; color:var(--navy); letter-spacing:.3px;}
  .authSub{text-align:center; color:var(--text-mut); font-size:12.5px; margin-bottom:24px;}
  label{display:block; font-size:12.5px; font-weight:600; color:var(--navy); margin:14px 0 5px;}
  input, select, textarea{width:100%; border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; font-size:14px; font-family:'Inter',sans-serif; background:#fff; color:var(--text);}
  input:focus, select:focus, textarea:focus{outline:none; border-color:var(--navy2);}
  .btn{border:none; border-radius:10px; padding:11px 16px; font-weight:700; font-size:13.5px; cursor:pointer; transition:.15s;}
  .btn-primary{background:var(--red); color:#fff; width:100%; margin-top:18px;}
  .btn-primary:hover{background:var(--red-dark);}
  .btn-outline{background:#fff; border:1.5px solid var(--line); color:var(--navy);}
  .btn-outline:hover{border-color:var(--navy2);}
  .btn-success{background:var(--success); color:#fff;}
  .helpText{font-size:11.5px; color:var(--text-mut); margin-top:6px; line-height:1.5;}
  .errorMsg{background:var(--red-tint); color:var(--red-dark); font-size:12.5px; padding:10px 12px; border-radius:10px; margin-top:14px; display:none;}

  #dashboard{display:none; min-height:100vh;}
  .shell{display:flex; min-height:100vh;}
  .sidebar{width:230px; background:var(--navy); color:#fff; flex:none; padding:24px 16px; display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow:hidden;}
  .sidebar .brandRow{justify-content:flex-start; margin-bottom:6px; flex:none;}
  .sidebar .brand{color:#fff; font-size:16px;}
  .roleTag{color:#C7D3E4; font-size:11px; margin-bottom:22px; text-transform:capitalize;}
  .navitem{padding:11px 12px; border-radius:10px; font-size:13.5px; font-weight:600; color:#C7D3E4; margin-bottom:4px; cursor:pointer; border:none; background:none; text-align:left; width:100%; display:flex; align-items:center; gap:8px;}
  .navitem:hover{background:rgba(255,255,255,.08); color:#fff;}
  .navitem.active{background:var(--red); color:#fff;}
  .sidebar-footer{margin-top:auto; flex:none;}
  #navList{overflow-y:auto; flex:1; min-height:0; padding-right:2px;}
  .roleTag{flex:none;}
  .logoutBtn{background:rgba(255,255,255,.08); color:#fff; border:none; border-radius:10px; padding:10px 12px; width:100%; font-size:12.5px; font-weight:600; cursor:pointer;}
  .logoutBtn:hover{background:rgba(255,255,255,.16);}

  .main{flex:1; padding:32px 36px; max-width:1150px;}
  .pageHead{display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;}
  .pageHead h1{font-size:20px; color:var(--navy); font-weight:800;}

  table{width:100%; border-collapse:collapse; background:var(--card); border-radius:14px; overflow:hidden; border:1px solid var(--line);}
  th{text-align:left; font-size:11.5px; color:var(--text-mut); padding:12px 14px; background:var(--navy-tint); font-weight:700;}
  td{padding:12px 14px; border-top:1px solid var(--line); font-size:13.5px; vertical-align:top;}
  tr:hover td{background:#FAFBFC;}

  .badge{font-size:10.5px; font-weight:700; padding:4px 10px; border-radius:999px; display:inline-block;}
  .badge.amber{background:var(--amber-tint); color:var(--amber);}
  .badge.success{background:var(--success-tint); color:var(--success);}
  .badge.red{background:var(--red-tint); color:var(--red-dark);}
  .badge.neutral{background:var(--navy-tint); color:var(--navy2);}

  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; margin-bottom:20px;}
  .cardTitle{font-weight:700; color:var(--navy); font-size:14px; margin-bottom:14px;}
  .formGrid{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .formGrid .full{grid-column:1 / -1;}
  .rowActions{display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;}

  .statRow{display:flex; gap:14px; margin-bottom:20px; flex-wrap:wrap;}
  .stat{flex:1; min-width:150px; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px;}
  .stat b{font-size:20px; color:var(--navy); display:block; font-family:'Poppins';}
  .stat span{font-size:11.5px; color:var(--text-mut);}

  .emptyState{color:var(--text-mut); font-size:13px; padding:24px; text-align:center;}
  .toast{position:fixed; bottom:24px; right:24px; background:var(--navy); color:#fff; padding:12px 18px; border-radius:10px; font-size:13px; font-weight:600; box-shadow:0 10px 30px rgba(0,0,0,.2); display:none; z-index:50;}
  .toast.error{background:var(--red-dark);}
  .smallMuted{color:var(--text-mut); font-size:12px;}
  .inlineSelect{padding:6px 8px; font-size:12.5px; border-radius:8px;}
  .permNote{background:var(--navy-tint); color:var(--navy2); font-size:12px; padding:12px 14px; border-radius:10px; margin-bottom:18px;}
  .langRow{display:flex; gap:6px;}
  .langChip{border:1.5px solid var(--line); background:#fff; color:var(--navy); font-size:11px; font-weight:700; padding:5px 10px; border-radius:999px; cursor:pointer; font-family:'Inter',sans-serif;}
  .langChip.active{background:var(--navy); border-color:var(--navy); color:#fff;}
  .sidebar .langRow{margin-top:14px; margin-bottom:10px;}
  .sidebar .langChip{border-color:rgba(255,255,255,.25); background:transparent; color:#C7D3E4;}
  .sidebar .langChip.active{background:var(--red); border-color:var(--red); color:#fff;}
</style>
</head>
<body>

<div id="setupScreen">
  <div class="authCard">
    <div class="brandRow"><img class="brandLogoImg" alt="SIGMA XPRESS" /><div class="brand">SIGMA XPRESS</div></div>
    <div class="authSub" id="setupSubtitle">Staff Dashboard Setup</div>
    <label id="setupLabel">Backend API address</label>
    <input id="apiUrlInput" placeholder="https://your-backend-address.com" />
    <div class="helpText">Saved in this browser only — you'll only re-enter it if the address changes.</div>
    <button class="btn btn-primary" id="setupContinueBtn" onclick="saveApiUrl()">Continue</button>
    <div class="errorMsg" id="setupError"></div>
    <div class="langRow" style="justify-content:center; margin-top:18px;"></div>
  </div>
</div>

<div id="loginScreen" style="display:none">
  <div class="authCard">
    <div class="brandRow"><img class="brandLogoImg" alt="SIGMA XPRESS" /><div class="brand">SIGMA XPRESS</div></div>
    <div class="authSub" id="loginSubtitle">Staff sign in</div>
    <label id="loginUsernameLabel">Username</label>
    <input id="loginUsername" placeholder="e.g. admin, sales1, accountant1..." autocomplete="username" />
    <label id="loginPasswordLabel">Password</label>
    <input id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password" />
    <button class="btn btn-primary" id="loginSubmitBtn" onclick="doLogin()">Log In</button>
    <div class="errorMsg" id="loginError"></div>
    <div class="helpText" id="changeBackendLink" style="text-align:center; margin-top:14px; cursor:pointer;" onclick="showSetup()">Change backend address</div>
    <div class="langRow" style="justify-content:center; margin-top:18px;"></div>
  </div>
</div>

<div id="dashboard">

  <div class="shell">
    <div class="sidebar">
      <div class="brandRow"><img class="brandLogoImg" alt="SIGMA XPRESS" /><div class="brand">SIGMA XPRESS</div></div>
      <div class="roleTag" id="roleTag"></div>
      <div id="navList"></div>
      <div class="sidebar-footer">
        <div class="langRow"></div>
        <button class="logoutBtn" id="sidebarLogoutBtn" onclick="doLogout()">Log Out</button>
      </div>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

   Role-aware: super_admin / sales / accountant / warehouse

  { key:'receiving',     label:'📥 Receiving',        roles:['super_admin','warehouse'] },
  { key:'shipments',     label:'📦 Shipments',       roles:['super_admin','sales','warehouse','accountant'] },
  { key:'customers',     label:'👥 Customers',       roles:['super_admin','sales'] },
  { key:'invoices',      label:'🧾 Invoices',        roles:['super_admin','accountant'] },
  { key:'purchases',     label:'💰 Purchases',       roles:['super_admin','accountant'] },
  { key:'expenses',      label:'💸 Expenses',        roles:['super_admin','accountant'] },
  { key:'quotes',        label:'💬 Quote Requests',  roles:['super_admin','sales'] },

  { key:'employees',     label:'🧑\u200d💼 Employees',    roles:['super_admin'] },
  { key:'warehouse',     label:'📍 Warehouse',       roles:['super_admin','warehouse'] },
];

function canSee(page){ return currentUser && NAV_ITEMS.find(n => n.key === page)?.roles.includes(currentUser.role); }

// Permission check for individually-customizable actions (independent of role).
// super_admin always has every permission; everyone else needs it explicitly
// granted on their account (set when the employee was created, editable after).
function hasPerm(perm){
  if (!currentUser) return false;
  if (currentUser.role === 'super_admin') return true;
  return (currentUser.permissions || []).includes(perm);
}

const DASH_LANGUAGES = [ { code: 'ar', label: 'العربية' }, { code: 'en', label: 'English' }, { code: 'zh', label: '中文' } ];
let dashLang = localStorage.getItem('sigmaDashLang') || 'en';

function dt(key){ return (DASH_TRANSLATIONS[dashLang] && DASH_TRANSLATIONS[dashLang][key]) || DASH_TRANSLATIONS.en[key] || key; }

function applyDashDirection(){
  document.documentElement.dir = dashLang === 'ar' ? 'rtl' : 'ltr';
  document.documentElement.lang = dashLang;
}

function langPickerHtml(){
  return DASH_LANGUAGES.map(l =>
    `<button type="button" class="langChip ${l.code === dashLang ? 'active' : ''}" onclick="setDashLang('${l.code}')">${l.label}</button>`
  ).join('');
}

function renderAllLangPickers(){
  document.querySelectorAll('.langRow').forEach(el => { el.innerHTML = langPickerHtml(); });
}

function renderLoginTexts(){
  const sub = document.getElementById('loginSubtitle'); if (sub) sub.textContent = dt('login_title');
  const uLabel = document.getElementById('loginUsernameLabel'); if (uLabel) uLabel.textContent = dt('login_username');
  const pLabel = document.getElementById('loginPasswordLabel'); if (pLabel) pLabel.textContent = dt('login_password');
  const submitBtn = document.getElementById('loginSubmitBtn'); if (submitBtn) submitBtn.textContent = dt('login_submit');
  const changeBackend = document.getElementById('changeBackendLink'); if (changeBackend) changeBackend.textContent = dt('login_change_backend');
  const setupSub = document.getElementById('setupSubtitle'); if (setupSub) setupSub.textContent = dt('setup_title');
  const setupLbl = document.getElementById('setupLabel'); if (setupLbl) setupLbl.textContent = dt('setup_label');
  const setupBtn = document.getElementById('setupContinueBtn'); if (setupBtn) setupBtn.textContent = dt('setup_continue');
}

function setDashLang(code){
  dashLang = code;
  localStorage.setItem('sigmaDashLang', code);
  applyDashDirection();
  renderAllLangPickers();
  renderLoginTexts();
  if (currentUser && document.getElementById('dashboard').style.display !== 'none') {
    const logoutBtn = document.getElementById('sidebarLogoutBtn'); if (logoutBtn) logoutBtn.textContent = dt('logout');
    renderNav();
    goPage(currentPage);
  }
}

function toast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3500);
}

async function api(path, options = {}) {
  const opts = Object.assign({}, options);
  opts.headers = Object.assign({ 'Content-Type': 'application/json' }, options.headers || {});
  if (accessToken) opts.headers.Authorization = 'Bearer ' + accessToken;

  let res = await fetch(API_URL + path, opts);
  if (res.status === 401 && refreshToken) {
    const r = await fetch(API_URL + '/auth/refresh', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken }) });
    if (r.ok) {
      const data = await r.json();
      accessToken = data.accessToken; refreshToken = data.refreshToken;
      localStorage.setItem('sigmaAccessToken', accessToken);
      localStorage.setItem('sigmaRefreshToken', refreshToken);
      opts.headers.Authorization = 'Bearer ' + accessToken;
      res = await fetch(API_URL + path, opts);
    } else { doLogout(); throw new Error('Session expired, please log in again.'); }
  }
  if (!res.ok) {
    let msg = 'Request failed';
    try { const j = await res.json(); msg = j.error || msg; } catch (e) {}
    throw new Error(msg);
  }
  if (res.status === 204) return null;
  return res.json();
}

function showSetup(){
  document.getElementById('setupScreen').style.display = 'flex';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('apiUrlInput').value = API_URL;
}
function showLogin(){
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
}
function showDashboard(){
  document.getElementById('setupScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('roleTag').textContent = currentUser.fullName + ' · ' + currentUser.role.replace('_',' ');
  const logoutBtn = document.getElementById('sidebarLogoutBtn'); if (logoutBtn) logoutBtn.textContent = dt('logout');
  renderAllLangPickers();
  renderNav();
  const firstPage = NAV_ITEMS.find(n => n.roles.includes(currentUser.role));
  goPage(firstPage ? firstPage.key : 'shipments');
}

function renderNav(){
  const list = document.getElementById('navList');
  list.innerHTML = NAV_ITEMS.filter(n => n.roles.includes(currentUser.role)).map(n =>
    `<button class="navitem" data-page="${n.key}" onclick="goPage('${n.key}')">${dt('nav_' + n.key)}</button>`
  ).join('');
}

function saveApiUrl(){
  const val = document.getElementById('apiUrlInput').value.trim().replace(/\/$/, '');
  const err = document.getElementById('setupError');
  if (!val.startsWith('http')) { err.textContent = 'Please enter a full address starting with http:// or https://'; err.style.display = 'block'; return; }
  API_URL = val;
  localStorage.setItem('sigmaApiUrl', API_URL);
  err.style.display = 'none';
  showLogin();
}

async function doLogin(){
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  err.style.display = 'none';
  if (!username || !password) { err.textContent = 'Please enter both username and password.'; err.style.display = 'block'; return; }
  try {
    const res = await fetch(API_URL + '/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
    if (!res.ok) throw new Error('Invalid username or password.');
    const data = await res.json();
    if (data.user.role === 'customer') throw new Error('This is a customer account — use the mobile app instead.');
    accessToken = data.accessToken; refreshToken = data.refreshToken; currentUser = data.user;
    localStorage.setItem('sigmaAccessToken', accessToken);
    localStorage.setItem('sigmaRefreshToken', refreshToken);
    localStorage.setItem('sigmaUser', JSON.stringify(currentUser));
    showDashboard();
  } catch (e) {
    err.textContent = e.message.includes('fetch') ? 'Could not reach the backend. Check the address and that the server is running.' : e.message;
    err.style.display = 'block';
  }
}

function doLogout(){
  accessToken = ''; refreshToken = ''; currentUser = null;
  localStorage.removeItem('sigmaAccessToken'); localStorage.removeItem('sigmaRefreshToken'); localStorage.removeItem('sigmaUser');
  showLogin();
}

function goPage(page){
  if (!canSee(page)) { toast('You do not have access to this section.', true); return; }
  currentPage = page;
  document.querySelectorAll('.navitem').forEach(n => n.classList.toggle('active', n.dataset.page === page));
  const renderers = {
    receiving: renderReceiving, shipments: renderShipments, customers: renderCustomers, invoices: renderInvoices,
    quotes: renderQuotes, services: renderServices, warehouse: renderWarehouse,
    offers: renderOffers, notifications: renderNotifications, reports: renderReports, employees: renderEmployees,
    purchases: renderPurchases, expenses: renderExpenses,
  };
  renderers[page]();
}

    </div>
    <div class="cardTitle">${dt('recv_stock_title')}</div>
    <div id="recvStockWrap"><div class="emptyState">Loading…</div></div>`;

  try {
    const [customers, categories] = await Promise.all([api('/admin/customers'), api('/categories')]);
    cachedCustomersRecv = customers; cachedCategoriesRecv = categories;
    document.getElementById('recvCustomer').innerHTML = customers.map(c => `<option value="${c.id}">${c.fullName} (${c.clientCode})</option>`).join('');
    document.getElementById('recvCategory').innerHTML += categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    await refreshReceivingStock();
  } catch (e) { toast(e.message, true); }
}

async function refreshReceivingStock(){
  const items = await api('/admin/receiving');
  const wrap = document.getElementById('recvStockWrap');
  if (!items.length) { wrap.innerHTML = `<div class="emptyState">${dt('recv_no_stock')}</div>`; return; }
  wrap.innerHTML = `<table><tr><th>${dt('recv_th_customer')}</th><th>${dt('recv_th_category')}</th><th>${dt('recv_th_weight_volume')}</th><th>${dt('recv_th_reference')}</th><th>${dt('recv_th_financial_note')}</th></tr>
    ${items.map(it => `<tr>
      <td>${it.customer ? it.customer.fullName + ' (' + it.customer.clientCode + ')' : '—'}</td>
      <td>${it.category ? it.category.name : '—'}</td>
      <td>${it.weightKg} kg · ${it.volumeCbm} CBM</td>
      <td class="smallMuted">${it.referenceNumber || '—'}</td>
      <td class="smallMuted">${it.financialNote || '—'}</td>
    </tr>`).join('')}</table>`;
}

async function submitReceiving(){
  const body = {
    customerId: document.getElementById('recvCustomer').value,
    categoryId: document.getElementById('recvCategory').value || null,
    weightKg: Number(document.getElementById('recvWeight').value || 0),
    volumeCbm: Number(document.getElementById('recvVolume').value || 0),
    packagesCount: document.getElementById('recvPackages').value ? Number(document.getElementById('recvPackages').value) : null,
    referenceNumber: document.getElementById('recvReference').value.trim() || null,
    description: document.getElementById('recvDescription').value.trim() || null,
    financialNote: document.getElementById('recvFinancialNote').value.trim() || null,
  };
  if (!body.customerId || !body.weightKg || !body.volumeCbm) { toast('Pick a customer and enter weight/volume.', true); return; }
  try {
    await api('/admin/receiving', { method: 'POST', body: JSON.stringify(body) });
    toast('Goods received and logged.');
    document.getElementById('recvWeight').value = '';
    document.getElementById('recvVolume').value = '';
    document.getElementById('recvPackages').value = '';
    document.getElementById('recvReference').value = '';
    document.getElementById('recvDescription').value = '';
    document.getElementById('recvFinancialNote').value = '';
    refreshReceivingStock();
  } catch (e) { toast(e.message, true); }
}

    await api('/admin/categories', { method: 'POST', body: JSON.stringify({ name }) });
    input.value = '';
    toast('Category added.');
    cachedCategories = await api('/categories');
    renderCategoryChips();
  } catch (e) { toast(e.message, true); }
}

function renderCategoryChips(){
  const wrap = document.getElementById('categoryChipsWrap');
  if (!wrap) return;
  wrap.innerHTML = cachedCategories.length
    ? cachedCategories.map(c => `<span class="badge neutral" style="margin:2px">${c.name}</span>`).join('')
    : `<span class="smallMuted">${dt('ship_no_categories')}</span>`;
}

async function renderShipments(){
  const main = document.getElementById('mainContent');
  const canReceive = hasPerm('shipments.create');
  const canManageCategories = hasPerm('shipments.manage_categories');

  main.innerHTML = `<div class="pageHead"><h1>${dt('page_shipments')}</h1></div>
    ${canManageCategories ? `<div class="card">
      <div class="cardTitle">${dt('ship_manage_categories')}</div>
      <div id="categoryChipsWrap" style="margin-bottom:10px;"></div>
      <div class="rowActions">
        <input id="newCategoryName" placeholder="${dt('ship_new_category_placeholder')}" style="max-width:260px" />
        <button class="btn btn-outline" onclick="addCategoryQuick()">${dt('ship_add_category')}</button>
      </div>
    </div>` : ''}
    ${canReceive ? `<div class="card">
      <div class="cardTitle">${dt('ship_list_title')}</div>
      <div class="formGrid">
        <div><label>${dt('ship_code')}</label><input id="newShipCode" placeholder="e.g. SGX-88300" /></div>
        <div class="full"><label>${dt('ship_warehouse')}</label><select id="newShipWarehouse"></select></div>
        <div><label>${dt('ship_load_type')}</label><select id="newShipLoad"><option value="">—</option><option value="full">${dt('common_full')}</option><option value="partial">${dt('common_partial')}</option></select></div>
        <div><label>${dt('ship_destination')}</label><input id="newShipDest" placeholder="e.g. Dubai, UAE" value="Dubai, UAE" /></div>
      </div>
      <div class="rowActions"><button class="btn btn-primary" style="width:auto" onclick="createShipment()">${dt('ship_log_receipt_btn')}</button></div>
    </div>` : ''}
    <div id="shipmentsWrap"><div class="emptyState">Loading…</div></div>`;

  try {
    const promises = [api('/admin/shipments')];
    if (canReceive) promises.push(api('/warehouses'));
    if (canManageCategories) promises.push(api('/categories'));
    const results = await Promise.all(promises);
    const shipments = results[0];

    if (canReceive) {
      const warehouses = results[1];
      const activeWarehouses = warehouses.filter(w => w.isActive);
      document.getElementById('newShipWarehouse').innerHTML = activeWarehouses.length
        ? activeWarehouses.map(w => `<option value="${w.id}">${w.name} — ${w.city} (${dt('common_' + w.freightType)})</option>`).join('')
        : `<option value="">${dt('ship_no_warehouses')}</option>`;
    }
    if (canManageCategories) {
      cachedCategories = results[canReceive ? 2 : 1];
      renderCategoryChips();
    }
    renderShipmentsListCards(shipments);
  } catch (e) { toast(e.message, true); }
}

function renderShipmentsListCards(shipments){
  const wrap = document.getElementById('shipmentsWrap');
  if (!shipments.length) { wrap.innerHTML = `<div class="emptyState">${dt('ship_no_shipments')}</div>`; return; }
  wrap.innerHTML = `<table><tr><th>${dt('ship_th_code')}</th><th>${dt('ship_warehouse')}</th><th>${dt('ship_th_type')}</th><th>${dt('ship_th_customers')}</th><th>${dt('ship_th_status')}</th><th>${dt('common_actions')}</th></tr>
    ${shipments.map(s => `<tr>
      <td><strong>${s.shipmentCode}</strong><br><span class="smallMuted">→ ${s.destination}</span></td>
      <td>${s.warehouse ? s.warehouse.name + ' (' + s.warehouse.city + ')' : '—'}</td>
      <td>${s.freightType}${s.loadType ? ' · ' + s.loadType : ''}</td>
      <td>${s.itemCount}</td>
      <td><span class="badge amber">${s.currentStatus}</span></td>
      <td><button class="btn btn-outline" style="padding:6px 10px; font-size:11px" onclick="renderShipmentDetail('${s.id}')">${dt('ship_view_detail')}</button></td>

async function createShipment(){
  const body = {
    shipmentCode: document.getElementById('newShipCode').value.trim(),
    warehouseId: document.getElementById('newShipWarehouse').value,
    loadType: document.getElementById('newShipLoad').value || null,
    destination: document.getElementById('newShipDest').value.trim(),
  };
  if (!body.shipmentCode || !body.warehouseId || !body.destination) { toast('Please fill in shipment code, warehouse and destination.', true); return; }
  try {
    const shipment = await api('/admin/shipments', { method: 'POST', body: JSON.stringify(body) });
    toast('Shipment created — now assign goods to it below.');
    renderShipmentDetail(shipment.id);
  } catch (e) { toast(e.message, true); }
}

    wrap.innerHTML = `
      <div class="cardTitle">${dt('ship_pricing_title')}</div>
      ${shipment.invoicesFinalized ? `<div class="helpText" style="margin-bottom:10px">${dt('ship_finalized_note')}</div>` : ''}

  const formWrap = document.getElementById('pricingFormWrap');
  formWrap.innerHTML = `
    <div class="card" style="margin-top:12px; background:var(--navy-tint)">

async function savePricing(shipmentId, itemId){
  const unitType = document.getElementById('priceUnitType').value;
  const unitPrice = document.getElementById('priceUnitPrice').value;
  const body = {
    unitType,
    unitPrice: unitType !== 'flat' ? Number(unitPrice || 0) : null,
    flatAmount: unitType === 'flat' ? Number(unitPrice || 0) : null,
    currency: document.getElementById('priceCurrency').value,
    extraDescription: document.getElementById('priceExtraDesc').value.trim() || null,
    extraAmount: document.getElementById('priceExtraAmount').value ? Number(document.getElementById('priceExtraAmount').value) : null,
  };
  try {
    await api(`/admin/shipments/${shipmentId}/items/${itemId}/price`, { method: 'PUT', body: JSON.stringify(body) });
    toast('Price saved.');
    renderPricingSection(shipmentId, hasPerm('invoices.override'));
  } catch (e) { toast(e.message, true); }
}

async function finalizeInvoices(shipmentId){
  try {
    await api(`/admin/shipments/${shipmentId}/finalize-invoices`, { method: 'POST' });
    toast('Invoices issued for every customer in this shipment.');
    renderShipmentDetail(shipmentId);
  } catch (e) { toast(e.message, true); }
}

async function closeShipment(shipmentId){
  try {
    await api(`/admin/shipments/${shipmentId}/close`, { method: 'POST' });
    toast('Shipment closed.');
    renderShipmentDetail(shipmentId);
  } catch (e) { toast(e.message, true); }
}

async function assignSelectedItems(shipmentId){
  const checked = Array.from(document.querySelectorAll('.assignCheckbox:checked')).map(el => el.value);
  if (!checked.length) { toast('Select at least one item to assign.', true); return; }
  try {
    await api(`/admin/shipments/${shipmentId}/assign`, { method: 'POST', body: JSON.stringify({ itemIds: checked }) });
    toast('Goods assigned to shipment.');
    renderShipmentDetail(shipmentId);
  } catch (e) { toast(e.message, true); }
}

async function saveItemMeasurements(shipmentId, itemId){
  const weightKg = Number(document.getElementById('itemW-' + itemId).value || 0);
  const volumeCbm = Number(document.getElementById('itemV-' + itemId).value || 0);
  try { await api(`/admin/shipments/${shipmentId}/items/${itemId}`, { method: 'PUT', body: JSON.stringify({ weightKg, volumeCbm }) }); toast('Saved.'); renderShipmentDetail(shipmentId); }
  catch (e) { toast(e.message, true); }
}

async function addStatus(id){
  const input = document.getElementById('statusInput-' + id);
  const statusLabel = input.value.trim();
  if (!statusLabel) { toast('Type a status update first.', true); return; }
  try { await api(`/admin/shipments/${id}/status`, { method: 'POST', body: JSON.stringify({ statusLabel }) }); toast('Status updated.'); renderShipmentDetail(id); }
  catch (e) { toast(e.message, true); }
}

const CURRENCIES_LIST = ['AED', 'CNY', 'USD'];

// Converts a [{currency, total, count}] breakdown into one unified number,
// using the exchange rates the accountant typed in. Returns null if no
// display currency is selected (i.e. "show original currencies" mode).
function convertToUnified(byCurrencyList){
  if (!reportDisplayCurrency) return null;
  let unified = 0;
  let missing = false;
  byCurrencyList.forEach(c => {
    if (c.currency === reportDisplayCurrency) { unified += c.total; return; }
    const rate = reportExchangeRates[c.currency];
    if (rate) unified += c.total * rate;
    else missing = true;
  });
  return { unified, missing };
}

function unifiedTotalHtml(byCurrencyList){
  const result = convertToUnified(byCurrencyList);
  if (!result) return '';
  if (result.missing) return `<div class="stat" style="background:var(--amber-tint)"><b style="color:var(--amber)">—</b><span>${dt('rep_missing_rate')}</span></div>`;
  return `<div class="stat" style="background:var(--navy); color:#fff"><b style="color:#fff">${reportDisplayCurrency} ${result.unified.toFixed(2)}</b><span style="color:#C7D3E4">${dt('rep_unified_total')}</span></div>`;
}

function renderCurrencyConverterControls(){
  const otherCurrencies = CURRENCIES_LIST.filter(c => c !== reportDisplayCurrency);
  const ratesHtml = reportDisplayCurrency ? otherCurrencies.map(c => `
    <div><label>1 ${c} = ? ${reportDisplayCurrency}</label>
      <input type="number" step="0.0001" id="rate-${c}" value="${reportExchangeRates[c] || ''}" oninput="onRateInput('${c}')" />
    </div>`).join('') : '';
  return `
    <div class="formGrid">
      <div><label>${dt('rep_display_currency')}</label>
        <select id="repDisplayCurrency" onchange="onDisplayCurrencyChange()">
          <option value="" ${reportDisplayCurrency === '' ? 'selected' : ''}>${dt('rep_display_none')}</option>
          ${CURRENCIES_LIST.map(c => `<option value="${c}" ${c === reportDisplayCurrency ? 'selected' : ''}>${c}</option>`).join('')}
        </select>
      </div>
      ${ratesHtml}
    </div>
    ${reportDisplayCurrency ? `<div class="helpText">${dt('rep_rate_hint')}</div>` : ''}`;
}

function onDisplayCurrencyChange(){
  reportDisplayCurrency = document.getElementById('repDisplayCurrency').value;
  reportExchangeRates = {};
  renderReports();
}

function onRateInput(currency){
  const val = Number(document.getElementById('rate-' + currency).value);

}

function permCheckboxesHtml(idPrefix, checkedList){
  return `<div class="formGrid" style="grid-template-columns:1fr 1fr 1fr;">` + PERMISSION_KEYS.map(p => {
    const key = 'perm_' + p.replace('.', '_');
    const checked = checkedList.includes(p) ? 'checked' : '';
    return `<label style="display:flex; align-items:center; gap:6px; font-weight:400; font-size:12.5px;">
      <input type="checkbox" id="${idPrefix}-${p}" value="${p}" ${checked} style="width:auto" /> ${dt(key)}
    </label>`;
  }).join('') + `</div>`;
}

function readCheckedPermissions(idPrefix){
  return PERMISSION_KEYS.filter(p => document.getElementById(`${idPrefix}-${p}`)?.checked);
}

function onNewEmpRoleChange(){
  const role = document.getElementById('newEmpRole').value;
  const defaults = empPermissionDefaults[role] || [];
  document.getElementById('newEmpPermissions').innerHTML = permCheckboxesHtml('newEmpPerm', role === 'super_admin' ? PERMISSION_KEYS : defaults);
}

async function renderEmployees(){
  const main = document.getElementById('mainContent');
  main.innerHTML = `<div class="pageHead"><h1>${dt('page_employees')}</h1></div>
    <div class="card">
      <div class="cardTitle">${dt('emp_create_title')}</div>
      <div class="formGrid">
        <div><label>${dt('cust_full_name')}</label><input id="newEmpName" /></div>
        <div><label>${dt('common_role')}</label>
          <select id="newEmpRole" onchange="onNewEmpRoleChange()"><option value="sales">Sales</option><option value="accountant">Accountant</option><option value="warehouse">Warehouse</option><option value="super_admin">Super Admin</option></select>
        </div>
        <div><label>${dt('common_username')}</label><input id="newEmpUsername" /></div>
        <div><label>${dt('common_password')}</label><input id="newEmpPassword" type="text" /></div>
        <div><label>${dt('common_phone')} (${dt('common_optional')})</label><input id="newEmpPhone" /></div>
        <div><label>${dt('common_email_optional')}</label><input id="newEmpEmail" /></div>
      </div>
      <div class="cardTitle" style="margin-top:16px">${dt('emp_permissions_title')}</div>
      <div class="helpText" style="margin-bottom:10px">${dt('emp_permissions_hint')}</div>
      <div id="newEmpPermissions"></div>
      <div class="rowActions"><button class="btn btn-primary" style="width:auto" onclick="createEmployee()">${dt('emp_create_btn')}</button></div>
    </div>
    <div id="employeesWrap"><div class="emptyState">Loading…</div></div>`;
  try {
    const permsMeta = await api('/admin/employees/permissions');
    empPermissionDefaults = permsMeta.defaultsByRole;
    onNewEmpRoleChange();
    await refreshEmployeesTable();
  } catch (e) { toast(e.message, true); }
}

async function refreshEmployeesTable(){
  const employees = await api('/admin/employees');
  const wrap = document.getElementById('employeesWrap');
  if (!employees.length) { wrap.innerHTML = `<div class="emptyState">${dt('emp_no_employees')}</div>`; return; }
  wrap.innerHTML = employees.map(e => `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <strong style="color:var(--navy)">${e.fullName}</strong>
          <span class="badge neutral" style="margin-left:8px">${e.role.replace('_',' ')}</span>
          <span class="badge ${e.status==='active'?'success':'red'}" style="margin-left:6px">${dt('badge_' + e.status)}</span>
          <div class="smallMuted" style="margin-top:4px">${e.username}</div>
        </div>
        <button class="btn btn-outline" style="padding:6px 10px; font-size:11.5px" onclick="toggleEmployeePermEditor('${e.id}')">${dt('emp_edit_permissions')}</button>
      </div>
      <div id="empPermEditor-${e.id}" style="display:none; margin-top:14px;">
        ${e.role === 'super_admin' ? `<div class="smallMuted">Super Admin always has every permission.</div>` : `
          ${permCheckboxesHtml('empPerm-' + e.id, e.permissions)}
          <div class="rowActions"><button class="btn btn-primary" style="width:auto" onclick="saveEmployeePermissions('${e.id}')">${dt('emp_save_permissions')}</button></div>
        `}
      </div>
    </div>`).join('');
}

function toggleEmployeePermEditor(id){
  const el = document.getElementById('empPermEditor-' + id);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function saveEmployeePermissions(id){
  const permissions = readCheckedPermissions('empPerm-' + id);
  try {
    await api(`/admin/employees/${id}/permissions`, { method: 'PUT', body: JSON.stringify({ permissions }) });
    toast('Permissions updated.');
    if (currentUser.id === id) { currentUser.permissions = permissions; localStorage.setItem('sigmaUser', JSON.stringify(currentUser)); }
    refreshEmployeesTable();
  } catch (e) { toast(e.message, true); }
}

async function createEmployee(){
  const body = {
    fullName: document.getElementById('newEmpName').value.trim(),
    role: document.getElementById('newEmpRole').value,
    username: document.getElementById('newEmpUsername').value.trim(),
    password: document.getElementById('newEmpPassword').value,
    phone: document.getElementById('newEmpPhone').value.trim(),
    email: document.getElementById('newEmpEmail').value.trim(),
    permissions: readCheckedPermissions('newEmpPerm'),
  };
  if (!body.fullName || !body.username || !body.password) { toast('Name, username and password are required.', true); return; }
  try { await api('/admin/employees', { method: 'POST', body: JSON.stringify(body) }); toast('Employee account created.'); renderEmployees(); }
  catch (e) { toast(e.message, true); }
}

async function renderWarehouse(){

        <div><label>${dt('wh_city')}</label><input id="whCity" placeholder="e.g. Guangzhou" /></div>
        <div><label>${dt('wh_country')}</label><input id="whCountry" placeholder="e.g. China" /></div>
        <div><label>${dt('wh_phone')}</label><input id="whPhone" /></div>
        <div><label>${dt('wh_hours')}</label><input id="whHours" /></div>
        <div class="full"><label>${dt('wh_address')}</label><input id="whAddress" /></div>
        <div class="full"><label>${dt('wh_instructions')} <span class="smallMuted">${dt('wh_instructions_hint')}</span></label><textarea id="whInstructions" rows="4"></textarea></div>
      </div>
      <div class="rowActions">
        <button class="btn btn-primary" style="width:auto" id="whSaveBtn" onclick="saveWarehouse()">${dt('wh_save_new_btn')}</button>
        <button class="btn btn-outline" id="whCancelBtn" style="display:none" onclick="cancelWarehouseEdit()">${dt('wh_cancel_edit')}</button>
      </div>
    </div>
    <div id="warehousesTableWrap"><div class="emptyState">Loading…</div></div>`;
  await refreshWarehousesTable();
}

async function refreshWarehousesTable(){
  try {
    const warehouses = await api('/admin/warehouse');
    const wrap = document.getElementById('warehousesTableWrap');
    if (!warehouses.length) { wrap.innerHTML = `<div class="emptyState">${dt('wh_no_data')}</div>`; return; }
    wrap.innerHTML = `<table><tr><th>${dt('wh_th_name')}</th><th>${dt('wh_th_type')}</th><th>${dt('wh_th_city')}</th><th>${dt('wh_th_status')}</th><th>${dt('common_actions')}</th></tr>
      ${warehouses.map(w => `<tr>
        <td>${w.name}</td>
        <td>${dt('common_' + w.freightType)}</td>
        <td>${w.city}${w.country ? ', ' + w.country : ''}</td>
        <td><span class="badge ${w.isActive ? 'success' : 'red'}">${w.isActive ? dt('badge_active') : dt('badge_disabled')}</span></td>
        <td>
          <button class="btn btn-outline" style="padding:5px 8px; font-size:11px" onclick='editWarehouse(${JSON.stringify(w).replace(/'/g, "&#39;")})'>${dt('wh_edit_btn')}</button>
          <button class="btn btn-outline" style="padding:5px 8px; font-size:11px" onclick="toggleWarehouseStatus('${w.id}', ${!w.isActive})">${w.isActive ? dt('offer_deactivate') : dt('offer_activate')}</button>
        </td>
      </tr>`).join('')}</table>`;
  } catch (e) { toast(e.message, true); }
}

function editWarehouse(w){
  editingWarehouseId = w.id;
  document.getElementById('whFormTitle').textContent = dt('wh_edit_btn') + ': ' + w.name;
  document.getElementById('whName').value = w.name || '';
  document.getElementById('whFreightType').value = w.freightType || 'sea';
  document.getElementById('whCity').value = w.city || '';
  document.getElementById('whCountry').value = w.country || '';
  document.getElementById('whPhone').value = w.phone || '';
  document.getElementById('whHours').value = w.workingHours || '';
  document.getElementById('whAddress').value = w.address || '';
  document.getElementById('whInstructions').value = w.instructions || '';
  document.getElementById('whSaveBtn').textContent = dt('wh_save_edit_btn');
  document.getElementById('whCancelBtn').style.display = 'inline-block';
  window.scrollTo(0, 0);
}

function cancelWarehouseEdit(){
  editingWarehouseId = null;
  renderWarehouse();
}

async function saveWarehouse(){
  const body = {
    name: document.getElementById('whName').value.trim(),
    freightType: document.getElementById('whFreightType').value,
    city: document.getElementById('whCity').value.trim(),
    country: document.getElementById('whCountry').value.trim(),
    phone: document.getElementById('whPhone').value.trim(),
    workingHours: document.getElementById('whHours').value.trim(),
    address: document.getElementById('whAddress').value.trim(),
    instructions: document.getElementById('whInstructions').value.trim(),
  };
  if (!body.name || !body.city || !body.address) { toast('Name, city and address are required.', true); return; }
  try {
    if (editingWarehouseId) {
      await api(`/admin/warehouse/${editingWarehouseId}`, { method: 'PUT', body: JSON.stringify(body) });
    } else {
      await api('/admin/warehouse', { method: 'POST', body: JSON.stringify(body) });
    }
    toast('Warehouse saved.');
    editingWarehouseId = null;
    renderWarehouse();
  } catch (e) { toast(e.message, true); }
}

async function toggleWarehouseStatus(id, isActive){
  try { await api(`/admin/warehouse/${id}/status`, { method: 'PUT', body: JSON.stringify({ isActive }) }); toast('Warehouse updated.'); refreshWarehousesTable(); }
  catch (e) { toast(e.message, true); }
}
